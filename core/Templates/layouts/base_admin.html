<!DOCTYPE html>
<html>
  {% load static %}

  <head>
    <title>{% block title %} {% endblock title %}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="{% static 'frontend/Images/web-icon.png' %}" />
    <!-- bootstrap: -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <!-- CSS: -->
    <link rel="stylesheet" href="{% static 'adminDashboard/css/style.css' %}" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Sofia"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Trirong"
    />
    {% block stylesheets %}{% endblock stylesheets %}
  </head>

  <body>
    <div class="log-modal" id="modal-logout">
      <div class="modal-logout-cotent">
        <h4>Are you sure you want to log out?</h4>
        <div class="logout-actions">
          <button class="yes-btn" style="color: var(--white)">
            <a href="/" style="color: inherit">Yes</a>
          </button>
          <button class="no-btn" id="close-log-modal">No</button>
        </div>
      </div>
    </div>

    <div class="dashboard-layout">
      {% include "includes/admin_sidebar.html" %}

      <main class="dashboard-content">{% block content %}{% endblock %}</main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'adminDashboard/javascript/main.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'frontend/javascript/theme.js' %}"></script>
    {% block scripts %}{% endblock scripts %}
  </body>
</html>
